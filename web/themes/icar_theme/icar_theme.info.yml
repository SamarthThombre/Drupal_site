name: icar_theme
type: theme
'base theme': stable9
version: 1.0.0
libraries:
  - icar_theme/base
  - icar_theme/messages
  - core/normalize
  - icar_theme/global-styling
libraries-extend:
  user/drupal.user:
    - icar_theme/user
  core/drupal.dropbutton:
    - icar_theme/dropbutton
  core/drupal.dialog:
    - icar_theme/dialog
  file/drupal.file:
    - icar_theme/file
  core/drupal.item-list:
    - icar_theme/item-list
  core/drupal.progress:
    - icar_theme/progress
  core/drupal.tablesort:
    - icar_theme/drupal.tablesort
description: ''
core_version_requirement: ^11
generator: 'starterkit_theme:11.3.11'
regions:
  topbar: 'Topbar'
  header: 'Header'
  primary_menu: 'Primary menu'
  content: 'Main content'
  sidebar: 'Sidebar'
  footer: 'Footer'
